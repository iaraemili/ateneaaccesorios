<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles/styles.css">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  
<header class="header">
  <div class="container header-contenido">

    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburguesa">☰</label>

    <div class="logo">
      <img src="assets/logo-atenea.png" alt="Logo de Atenea Accesorios">
    </div>

    <nav class="nav">
      <ul class="nav-lista">
        <li><a href="index.html">Inicio</a></li>
        <li><a href="pages/products.html">Productos</a></li>
        <li><a href="pages/gallery.html">Galería</a></li>
        <li><a href="pages/about.html">Sobre la marca</a></li>
        <li><a href="pages/contact.html">Contacto</a></li>
      </ul>
    </nav>

  </div>
</header>

<main class="container">

  <!-- HERO -->
  <section class="hero">
    <div class="hero-texto">
      <h1>Atenea Accesorios</h1>
      <h2>Joyas que se adaptan a tu estilo</h2>
    </div>

    <div class="hero-imagen">
      <img src="assets/images/accesorios/combo-lovely-dorado.jpg" alt="Colección">
    </div>
  </section>

  <!-- CARRUSEL BOOTSTRAP -->
  <div id="carouselAtenea" class="carousel slide mt-5" data-bs-ride="carousel">
    <div class="carousel-inner rounded-4 overflow-hidden">

      <div class="carousel-item active">
        <img src="assets/images/accesorios/anillo-aurora.jpg" class="d-block w-100" alt="Anillo Aurora">
      </div>

      <div class="carousel-item">
        <img src="assets/images/accesorios/aros-gota.jpg" class="d-block w-100" alt="Aros Gota">
      </div>

      <div class="carousel-item">
        <img src="assets/images/accesorios/trio-pulseras-strass.jpg" class="d-block w-100" alt="Pulseras Strass">
      </div>

    </div>

    <button class="carousel-control-prev" type="button" data-bs-target="#carouselAtenea" data-bs-slide="prev">
      <span class="carousel-control-prev-icon"></span>
    </button>

    <button class="carousel-control-next" type="button" data-bs-target="#carouselAtenea" data-bs-slide="next">
      <span class="carousel-control-next-icon"></span>
    </button>
  </div>

  <!-- PRODUCTOS DESTACADOS -->
  <section class="mt-5">
    <h2>Colecciones destacadas</h2>

    <div class="productos-grid">
      <article class="card-producto">
        <h3>Aros Gota Dorados</h3>
        <img src="assets/images/accesorios/aros-gota.jpg" alt="Aros Gota Dorados">
        <p>$25.000</p>
      </article>

      <article class="card-producto">
        <h3>Trío de Pulseras Strass Doradas</h3>
        <img src="assets/images/accesorios/trio-pulseras-strass.jpg" alt="Trío de Pulseras Strass Doradas">
        <p>$18.000</p>
      </article>
    </div>
  </section>

</main>
