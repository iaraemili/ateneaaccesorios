<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacto | Atenea Joyería</title>
  <link rel="stylesheet" href="../styles/styles.css">
</head>

<body>

<header class="header">
  <div class="container header-contenido">

    <!-- MENU HAMBURGUESA -->
    <input type="checkbox" id="menu-toggle">
    <label for="menu-toggle" class="hamburguesa">☰</label>

    <!-- LOGO -->
    <div class="logo">
      <img src="../assets/logo-atenea.png" alt="Logo de Atenea Accesorios">
    </div>

    <!-- NAV -->
    <nav class="nav">
      <ul class="nav-lista">
        <li><a href="../index.html">Inicio</a></li>
        <li><a href="../pages/products.html">Productos</a></li>
        <li><a href="../pages/gallery.html">Galería</a></li>
        <li><a href="../pages/about.html">Sobre la marca</a></li>
        <li><a href="../pages/contact.html">Contacto</a></li>
      </ul>
    </nav>

  </div>
</header>

  <!-- MAIN -->
  <main class="container contacto">

    <h1>Contacto</h1>

    <div class="contacto-contenido">

      <form class="formulario">

        <div class="fila">

          <div class="campo">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" required>
          </div>

          <div class="campo">
            <label for="email">Email</label>
            <input type="email" id="email" required>
          </div>

        </div>

        <div class="campo">
          <label for="mensaje">Mensaje</label>
          <textarea id="mensaje" required></textarea>
        </div>

        <fieldset class="consulta">
          <legend>Tipo de consulta</legend>
          <label><input type="checkbox"> Producto</label>
          <label><input type="checkbox"> Pedido personalizado</label>
        </fieldset>

        <button type="submit">Enviar</button>

      </form>

      <div class="mapa">
        <iframe
          src="https://www.google.com/maps/embed"
          title="Mapa del local"
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade">
        </iframe>
      </div>

    </div>

  </main>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="container">
      <p>© 2024 Atenea Joyería</p>
    </div>
  </footer>

</body>
</html>
